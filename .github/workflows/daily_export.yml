name: Daily Jira to Google Sheets Export

on:
  schedule:
    # Runs at 8:00 AM UTC every day. You can adjust the cron syntax for your timezone.
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to trigger it manually by clicking a button in GitHub

jobs:
  export_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jira pandas openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Jira Export Script
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python ./jira/jira-extraction.py
